version: 2

project_name: gitlab-mcp

before:
  hooks:
    - go mod tidy

builds:
  - id: gitlab-mcp
    main: ./cmd/gitlab-mcp
    binary: gitlab-mcp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/vgromanov/gitlab-mcp/internal/version.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - src: docs/**
        dst: docs

checksum:
  name_template: SHA256SUMS

snapshot:
  version_template: "{{ incpatch .Version }}-next"

dockers:
  - id: linux-amd64
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - ghcr.io/vgromanov/gitlab-mcp:{{ .Version }}-amd64
    build_flag_templates:
      - --pull
      - --platform=linux/amd64
      - --label=org.opencontainers.image.title=gitlab-mcp
      - --label=org.opencontainers.image.description=GitLab Model Context Protocol server
      - --label=org.opencontainers.image.url=https://github.com/vgromanov/gitlab-mcp
      - --label=org.opencontainers.image.source=https://github.com/vgromanov/gitlab-mcp
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
  - id: linux-arm64
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - ghcr.io/vgromanov/gitlab-mcp:{{ .Version }}-arm64
    build_flag_templates:
      - --pull
      - --platform=linux/arm64
      - --label=org.opencontainers.image.title=gitlab-mcp
      - --label=org.opencontainers.image.description=GitLab Model Context Protocol server
      - --label=org.opencontainers.image.url=https://github.com/vgromanov/gitlab-mcp
      - --label=org.opencontainers.image.source=https://github.com/vgromanov/gitlab-mcp
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}

docker_manifests:
  - name_template: ghcr.io/vgromanov/gitlab-mcp:{{ .Version }}
    image_templates:
      - ghcr.io/vgromanov/gitlab-mcp:{{ .Version }}-amd64
      - ghcr.io/vgromanov/gitlab-mcp:{{ .Version }}-arm64
  - name_template: ghcr.io/vgromanov/gitlab-mcp:latest
    image_templates:
      - ghcr.io/vgromanov/gitlab-mcp:{{ .Version }}-amd64
      - ghcr.io/vgromanov/gitlab-mcp:{{ .Version }}-arm64

release:
  draft: false
  prerelease: auto
