name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go mod tidy (drift gate)
        if: runner.os == 'Linux'
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /tmp/gitlab-mcp ./cmd/gitlab-mcp

      - name: Test
        run: go test -race -count=1 ./...

  integration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Write .env from secrets
        env:
          GITLAB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITLAB_PERSONAL_ACCESS_TOKEN }}
          GITLAB_API_URL: ${{ secrets.GITLAB_API_URL }}
        run: |
          test -n "$GITLAB_PERSONAL_ACCESS_TOKEN"
          {
            echo "GITLAB_PERSONAL_ACCESS_TOKEN=$GITLAB_PERSONAL_ACCESS_TOKEN"
            echo "GITLAB_API_URL=${GITLAB_API_URL:-https://gitlab.com/api/v4}"
          } > .env

      - name: Integration tests
        run: go test -tags=integration -timeout=10m ./...
