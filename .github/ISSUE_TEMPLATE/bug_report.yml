name: Bug report
description: Report incorrect behavior, a crash, or a regression
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please redact tokens, hostnames, and other secrets from logs.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Release tag (for example `v0.1.0`) or output of `git rev-parse HEAD`
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: arch
    attributes:
      label: CPU architecture
      placeholder: amd64, arm64, ...
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: MCP client
      options:
        - Cursor
        - Claude Desktop
        - Other desktop client
        - Custom / HTTP client
        - Unsure
    validations:
      required: true
  - type: input
    id: transport
    attributes:
      label: Transport
      description: stdio or streamable HTTP (include bind address if HTTP)
      placeholder: stdio
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps that reproduce the problem.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include exact errors and tool names when relevant.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant stderr / client logs (redact secrets).
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I am not sending secrets or live tokens in this issue.
          required: true
        - label: I searched existing issues for duplicates.
          required: true
